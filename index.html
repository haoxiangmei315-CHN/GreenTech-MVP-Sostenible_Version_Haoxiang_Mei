<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salvemos el Planeta | GreenTech</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Nativo: Reemplazo de Bootstrap */
        :root {
            --primary-green: #28a745;
            --dark-green: #1e7e34;
            --bg-color: #f4fdf4;
        }
        
        body {
            font-family: "Montserrat", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Contenedor Hero para poder usar la etiqueta img con lazy loading */
        .hero-container {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.7); /* Oscurece un poco para leer el texto */
        }

        .hero-content {
            padding: 20px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
            z-index: 1;
        }

        .hero-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .hero-subtitle {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            margin-bottom: 2rem;
        }

        .btn-eco {
            background-color: var(--primary-green);
            color: white;
            border: 2px solid var(--dark-green);
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
            transition: background-color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-eco:hover {
            background-color: var(--dark-green);
        }

        .footer {
            text-align: center;
            padding: 15px;
            background-color: #212529;
            color: white;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <main class="hero-container">
        <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=1200&auto=format&fit=crop"
             alt="Paisaje natural de bosque"
             class="hero-bg"
             loading="lazy">

        <div class="hero-content">
            <h1 class="hero-title">Salvemos el Planeta</h1>
            <p class="hero-subtitle">Únete a la revolución verde de GreenTech.</p>
            <button class="btn-eco">
                <span aria-hidden="true">🍃</span> Quiero ayudar
            </button>
        </div>
    </main>

    <footer class="footer" id="footer">
        </footer>
</body>
</html>
